name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: linux-amd64
            target: x86_64-linux-musl
            cpu: ""
            optimize: ReleaseSafe
          - asset: linux-arm64
            target: aarch64-linux-musl
            cpu: ""
            optimize: ReleaseSafe
          - asset: linux-armv7
            target: arm-linux-musleabihf
            cpu: cortex_a7
            optimize: ReleaseSafe
          - asset: macos-amd64
            target: x86_64-macos
            cpu: ""
            optimize: ReleaseSafe
          - asset: macos-arm64
            target: aarch64-macos
            cpu: ""
            optimize: ReleaseSafe
          - asset: linux-amd64-small
            target: x86_64-linux-musl
            cpu: ""
            optimize: ReleaseSmall
          - asset: linux-arm64-small
            target: aarch64-linux-musl
            cpu: ""
            optimize: ReleaseSmall
          - asset: linux-armv7-small
            target: arm-linux-musleabihf
            cpu: cortex_a7
            optimize: ReleaseSmall
          - asset: macos-amd64-small
            target: x86_64-macos
            cpu: ""
            optimize: ReleaseSmall
          - asset: macos-arm64-small
            target: aarch64-macos
            cpu: ""
            optimize: ReleaseSmall
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Zig
        run: |
          version=0.16.0
          sha256=70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00
          curl -fsSL "https://ziglang.org/download/${version}/zig-x86_64-linux-${version}.tar.xz" -o zig.tar.xz
          echo "${sha256}  zig.tar.xz" | sha256sum -c -
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-${version}" >> "$GITHUB_PATH"
          "$PWD/zig-x86_64-linux-${version}/zig" version

      - name: Build ${{ matrix.optimize }}
        run: |
          # Embed the exact tag as the binary version (single source of truth at release time).
          # On a tag push GITHUB_REF_NAME is like "v0.0.3" → strip the leading "v".
          # On workflow_dispatch (no tag) fall back to the build.zig.zon default.
          case "$GITHUB_REF_NAME" in
            v*) version_arg="-Dversion=${GITHUB_REF_NAME#v}" ;;
            *)  version_arg="" ;;
          esac
          if [ -n "${{ matrix.cpu }}" ]; then
            zig build -Doptimize=${{ matrix.optimize }} -Dtarget=${{ matrix.target }} -Dcpu=${{ matrix.cpu }} $version_arg
          else
            zig build -Doptimize=${{ matrix.optimize }} -Dtarget=${{ matrix.target }} $version_arg
          fi

      - name: Create archive
        id: package
        run: |
          version="${GITHUB_REF_NAME//\//-}"
          artifact="scoot-${version}-${{ matrix.asset }}"
          mkdir -p dist/scoot
          cp zig-out/bin/scoot dist/scoot/
          cp README.md config.example.toml install.sh dist/scoot/
          cp -R docs dist/scoot/docs
          tar -C dist -czf "${artifact}.tar.gz" scoot
          sha256sum "${artifact}.tar.gz" > "${artifact}.tar.gz.sha256"
          echo "archive=${artifact}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${artifact}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scoot-${{ matrix.asset }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist-artifacts

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Pull the section for this tag out of CHANGELOG.md so the published
          # release notes match the maintained changelog. Fall back to GitHub's
          # auto-generated notes when the version has no entry yet.
          version="${GITHUB_REF_NAME#v}"
          notes_file="$RUNNER_TEMP/release-notes.md"
          if [ -f CHANGELOG.md ] && awk -v v="$version" '
              $0 ~ "^## \\[" v "\\]" { capture = 1; next }
              capture && (/^## \[/ || /^\[[^][]+\]:/) { exit }
              capture { print }
            ' CHANGELOG.md | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}' > "$notes_file" && [ -s "$notes_file" ]; then
            echo "source=changelog" >> "$GITHUB_OUTPUT"
          else
            echo "No CHANGELOG.md entry for $version; using auto-generated notes." >&2
            echo "source=generated" >> "$GITHUB_OUTPUT"
          fi
          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create draft release with all assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find dist-artifacts -type f | sort)
          files+=(install.sh)
          if [ "${{ steps.notes.outputs.source }}" = "changelog" ]; then
            notes_args=(--notes-file "${{ steps.notes.outputs.file }}")
          else
            notes_args=(--generate-notes)
          fi
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --draft \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            "${notes_args[@]}"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest

  docker:
    name: Build and publish Docker image (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: default
            target: runtime
            tag_suffix: ""
          - flavor: alpine
            target: runtime-alpine
            tag_suffix: "-alpine"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        # Ensure it doesn't fail if the user hasn't set up the secret yet,
        # but attempts if the secret exists.
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Strip v prefix from version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve Docker image names
        id: images
        run: |
          {
            echo "images<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY,,}"
            if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
              echo "${DOCKERHUB_USERNAME}/scoot"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.images }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=true
          flavor: |
            suffix=${{ matrix.tag_suffix }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
