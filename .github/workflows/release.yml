name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Only the ReleaseSafe flavor is published. Users who need a smaller
        # binary compile with `-Doptimize=ReleaseSmall` from source (documented
        # in the release notes footer and Installation guide).
        include:
          - asset: linux-amd64
            target: x86_64-linux-musl
            cpu: ""
          - asset: linux-arm64
            target: aarch64-linux-musl
            cpu: ""
          - asset: linux-armv7
            target: arm-linux-musleabihf
            cpu: cortex_a7
          - asset: macos-amd64
            target: x86_64-macos
            cpu: ""
          - asset: macos-arm64
            target: aarch64-macos
            cpu: ""
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Zig
        run: |
          version=0.16.0
          sha256=70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00
          curl -fsSL "https://ziglang.org/download/${version}/zig-x86_64-linux-${version}.tar.xz" -o zig.tar.xz
          echo "${sha256}  zig.tar.xz" | sha256sum -c -
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-${version}" >> "$GITHUB_PATH"
          "$PWD/zig-x86_64-linux-${version}/zig" version

      - name: Build ReleaseSafe (scoot + scoot-wasm + scoot-edge)
        run: |
          # Embed the exact tag as the binary version (single source of truth at release time).
          # On a tag push GITHUB_REF_NAME is like "v0.0.3" → strip the leading "v".
          # On workflow_dispatch (no tag) fall back to the build.zig.zon default.
          case "$GITHUB_REF_NAME" in
            v*) version_arg="-Dversion=${GITHUB_REF_NAME#v}" ;;
            *)  version_arg="" ;;
          esac
          # `-Dwasm-host=true` and `-Dedge=true` build the core `scoot` binary
          # plus the optional `scoot-wasm` compute-unit host and `scoot-edge`
          # fleet companion in one pass.
          if [ -n "${{ matrix.cpu }}" ]; then
            zig build -Doptimize=ReleaseSafe -Dwasm-host=true -Dedge=true -Dtarget=${{ matrix.target }} -Dcpu=${{ matrix.cpu }} $version_arg
          else
            zig build -Doptimize=ReleaseSafe -Dwasm-host=true -Dedge=true -Dtarget=${{ matrix.target }} $version_arg
          fi

      - name: Create archives
        id: package
        run: |
          version="${GITHUB_REF_NAME//\//-}"

          # Core `scoot` archive (layout consumed by install.sh: scoot/scoot).
          core="scoot-${version}-${{ matrix.asset }}"
          mkdir -p dist/scoot
          cp zig-out/bin/scoot dist/scoot/
          cp README.md config.example.toml install.sh dist/scoot/
          cp -R docs dist/scoot/docs
          tar -C dist -czf "${core}.tar.gz" scoot
          sha256sum "${core}.tar.gz" > "${core}.tar.gz.sha256"

          # Optional `scoot-wasm` host archive (layout: scoot-wasm/scoot-wasm).
          wasm="scoot-wasm-${version}-${{ matrix.asset }}"
          mkdir -p dist/scoot-wasm
          cp zig-out/bin/scoot-wasm dist/scoot-wasm/
          cp README.md dist/scoot-wasm/
          tar -C dist -czf "${wasm}.tar.gz" scoot-wasm
          sha256sum "${wasm}.tar.gz" > "${wasm}.tar.gz.sha256"

          # Optional `scoot-edge` fleet companion archive (layout: scoot-edge/scoot-edge).
          edge="scoot-edge-${version}-${{ matrix.asset }}"
          mkdir -p dist/scoot-edge
          cp zig-out/bin/scoot-edge dist/scoot-edge/
          cp README.md docs/EDGE.md docs/EDGE.zh.md dist/scoot-edge/
          tar -C dist -czf "${edge}.tar.gz" scoot-edge
          sha256sum "${edge}.tar.gz" > "${edge}.tar.gz.sha256"

          echo "core=${core}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "core_checksum=${core}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          echo "wasm=${wasm}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "wasm_checksum=${wasm}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          echo "edge=${edge}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "edge_checksum=${edge}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scoot-${{ matrix.asset }}
          path: |
            ${{ steps.package.outputs.core }}
            ${{ steps.package.outputs.core_checksum }}
            ${{ steps.package.outputs.wasm }}
            ${{ steps.package.outputs.wasm_checksum }}
            ${{ steps.package.outputs.edge }}
            ${{ steps.package.outputs.edge_checksum }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist-artifacts

      - name: Build release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Always render the body to a single file so the permanent footer is
          # attached regardless of whether the body came from CHANGELOG.md or
          # GitHub's auto-generated notes.
          version="${GITHUB_REF_NAME#v}"
          notes_file="$RUNNER_TEMP/release-notes.md"
          if [ -f CHANGELOG.md ] && awk -v v="$version" '
              $0 ~ "^## \\[" v "\\]" { capture = 1; next }
              capture && (/^## \[/ || /^\[[^][]+\]:/) { exit }
              capture { print }
            ' CHANGELOG.md | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}' > "$notes_file" && [ -s "$notes_file" ]; then
            echo "Using CHANGELOG.md section for $version" >&2
          else
            echo "No CHANGELOG.md entry for $version; using auto-generated notes." >&2
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$GITHUB_REF_NAME" --jq .body > "$notes_file" || : > "$notes_file"
          fi

          # Permanent footer: explain the published flavor and how to get a
          # smaller binary or the optional Wasm compute-unit host.
          cat .github/release-footer.md >> "$notes_file"

          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create draft release with all assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find dist-artifacts -type f | sort)
          files+=(install.sh)
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --draft \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file "${{ steps.notes.outputs.file }}"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    env:
      # Set HOMEBREW_TAP_TOKEN (a PAT with push access to the tap repo) to enable
      # this job. Without it the job no-ops, mirroring the optional Docker Hub
      # publish path. HOMEBREW_TAP_REPO is the `homebrew-<tap>` repository that
      # backs `brew install <owner>/<tap>/<formula>`.
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      HOMEBREW_TAP_REPO: jamiesun/homebrew-tap
    steps:
      - name: Download release artifacts
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist-artifacts

      - name: Render and push formulae
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"          # e.g. v0.4.0
          VERSION="${TAG#v}"              # e.g. 0.4.0
          base="https://github.com/jamiesun/scoot/releases/download/${TAG}"

          # First whitespace field of the matching `.sha256` artifact file.
          sha() {
            local f
            f="$(find dist-artifacts -name "$1.sha256" -print -quit)"
            [ -n "$f" ] || { echo "missing checksum for $1" >&2; exit 1; }
            awk '{print $1; exit}' "$f"
          }
          SCOOT_ARM_SHA="$(sha "scoot-${TAG}-macos-arm64.tar.gz")"
          SCOOT_AMD_SHA="$(sha "scoot-${TAG}-macos-amd64.tar.gz")"
          WASM_ARM_SHA="$(sha "scoot-wasm-${TAG}-macos-arm64.tar.gz")"
          WASM_AMD_SHA="$(sha "scoot-wasm-${TAG}-macos-amd64.tar.gz")"
          EDGE_ARM_SHA="$(sha "scoot-edge-${TAG}-macos-arm64.tar.gz")"
          EDGE_AMD_SHA="$(sha "scoot-edge-${TAG}-macos-amd64.tar.gz")"

          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/scoot.rb <<EOF
          class Scoot < Formula
            desc "Lightweight, local-first, auditable AI agent daemon and CLI in pure Zig"
            homepage "https://github.com/jamiesun/scoot"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${base}/scoot-${TAG}-macos-arm64.tar.gz"
                sha256 "${SCOOT_ARM_SHA}"
              else
                url "${base}/scoot-${TAG}-macos-amd64.tar.gz"
                sha256 "${SCOOT_AMD_SHA}"
              end
            end

            def install
              bin.install "scoot"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/scoot --version")
            end
          end
          EOF

          cat > tap/Formula/scoot-wasm.rb <<EOF
          class ScootWasm < Formula
            desc "Optional standalone Wasm compute-unit host for scoot"
            homepage "https://github.com/jamiesun/scoot"
            version "${VERSION}"
            license "MIT"

            # Installing the host pulls in the agent so wasm_tool works end-to-end.
            depends_on "jamiesun/tap/scoot"

            on_macos do
              if Hardware::CPU.arm?
                url "${base}/scoot-wasm-${TAG}-macos-arm64.tar.gz"
                sha256 "${WASM_ARM_SHA}"
              else
                url "${base}/scoot-wasm-${TAG}-macos-amd64.tar.gz"
                sha256 "${WASM_AMD_SHA}"
              end
            end

            def install
              bin.install "scoot-wasm"
            end

            test do
              assert_path_exists bin/"scoot-wasm"
            end
          end
          EOF

          cat > tap/Formula/scoot-edge.rb <<EOF
          class ScootEdge < Formula
            desc "Optional standalone fleet companion (status heartbeat + job dispatch) for scoot"
            homepage "https://github.com/jamiesun/scoot"
            version "${VERSION}"
            license "MIT"

            # scoot-edge launches the agent as a subprocess, so installing it
            # pulls in scoot for a working end-to-end setup.
            depends_on "jamiesun/tap/scoot"

            on_macos do
              if Hardware::CPU.arm?
                url "${base}/scoot-edge-${TAG}-macos-arm64.tar.gz"
                sha256 "${EDGE_ARM_SHA}"
              else
                url "${base}/scoot-edge-${TAG}-macos-amd64.tar.gz"
                sha256 "${EDGE_AMD_SHA}"
              end
            end

            def install
              bin.install "scoot-edge"
            end

            test do
              assert_path_exists bin/"scoot-edge"
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/scoot.rb Formula/scoot-wasm.rb Formula/scoot-edge.rb
          if git diff --cached --quiet; then
            echo "Formulae already up to date for ${VERSION}"
          else
            git commit -m "scoot ${VERSION}"
            git push
          fi

  apt:
    name: Publish apt packages (scoot, scoot-wasm, scoot-edge)
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    env:
      # Set APT_TAP_TOKEN (a PAT with push access to the apt-tap repo) to
      # enable this job. Without it the job no-ops, mirroring the optional
      # Homebrew tap / Docker Hub publish paths. APT_TAP_REPO is the shared
      # apt repository (jamiesun/apt-tap, one suite shared across unrelated
      # projects, mirroring homebrew-tap) that backs `apt install scoot`,
      # `apt install scoot-wasm`, and `apt install scoot-edge` once a user
      # has added its Pages URL as an apt source (see
      # book/en/src/installation.md). This job never touches the apt-tap
      # signing key -- that repository's own workflow signs and republishes
      # the index whenever pool/ changes, keeping the GPG private key's
      # blast radius confined to a single repo.
      APT_TAP_TOKEN: ${{ secrets.APT_TAP_TOKEN }}
      APT_TAP_REPO: jamiesun/apt-tap
    steps:
      - name: Download release artifacts
        if: ${{ env.APT_TAP_TOKEN != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist-artifacts

      - name: Build .deb packages and push to apt-tap
        if: ${{ env.APT_TAP_TOKEN != '' }}
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"           # e.g. v0.7.1
          VERSION="${TAG#v}"               # e.g. 0.7.1
          WORKDIR="$(mktemp -d)"

          git clone --depth 1 \
            "https://x-access-token:${APT_TAP_TOKEN}@github.com/${APT_TAP_REPO}.git" "$WORKDIR/tap"

          # $1 = package name (matches the release asset prefix and the
          # installed binary name), $2 = this repo's release asset arch
          # suffix, $3 = Debian architecture name, $4 = "Depends:" value
          # (empty for none), $5 = "Description:" block with a literal `\n`
          # between lines (each continuation line already includes its
          # required single leading space; expanded via `printf '%b'`),
          # remaining args = doc files copied from the archive into
          # /usr/share/doc/<pkg>/.
          build_one() {
            local pkg="$1" asset="$2" deb_arch="$3" depends="$4" description="$5"
            shift 5
            local doc_files=("$@")
            local archive extract_dir pkgdir dest deb_name

            archive="$(find dist-artifacts -name "${pkg}-${TAG}-${asset}.tar.gz" -print -quit)"
            [ -n "$archive" ] || { echo "missing archive for ${pkg} ${asset}" >&2; exit 1; }

            extract_dir="$WORKDIR/${pkg}-${asset}"
            mkdir -p "$extract_dir"
            tar -C "$extract_dir" -xzf "$archive"

            pkgdir="$WORKDIR/${pkg}-${asset}-pkg"
            mkdir -p "$pkgdir/DEBIAN" "$pkgdir/usr/bin" "$pkgdir/usr/share/doc/${pkg}"
            install -m 0755 "$extract_dir/${pkg}/${pkg}" "$pkgdir/usr/bin/${pkg}"
            for f in "${doc_files[@]}"; do
              cp "$extract_dir/${pkg}/${f}" "$pkgdir/usr/share/doc/${pkg}/"
            done

            {
              printf 'Package: %s\n' "$pkg"
              printf 'Version: %s\n' "$VERSION"
              printf 'Section: utils\n'
              printf 'Priority: optional\n'
              printf 'Architecture: %s\n' "$deb_arch"
              [ -n "$depends" ] && printf 'Depends: %s\n' "$depends"
              printf 'Maintainer: Jett Wang <jamiesun.net@gmail.com>\n'
              printf 'Homepage: https://github.com/jamiesun/scoot\n'
              printf '%b\n' "$description"
            } > "$pkgdir/DEBIAN/control"

            dest="$WORKDIR/tap/pool/main/${pkg:0:1}/${pkg}"
            mkdir -p "$dest"
            deb_name="${pkg}_${VERSION}_${deb_arch}.deb"
            dpkg-deb --build --root-owner-group "$pkgdir" "$dest/${deb_name}"
          }

          scoot_desc='Description: Lightweight, local-first, auditable AI agent daemon and CLI\n scoot runs a ReACT loop against an OpenAI-compatible Responses API backend,\n with built-in tools (bash, file I/O, grep, glob, http_request, skill,\n recall, MCP, wasm_tool), execution policy gates, local skills, scheduled\n jobs, and JSONL audit logging. Statically linked (musl); no runtime\n dependencies.'
          wasm_desc='Description: Optional standalone Wasm compute-unit host for scoot\n scoot-wasm runs compute-only Wasm/WASI packages for the wasm_tool action.\n Installing it pulls in scoot so wasm_tool works end-to-end. Statically\n linked (musl); no runtime dependencies.'
          edge_desc='Description: Optional fleet companion (status heartbeat + job dispatch) for scoot\n scoot-edge is a standalone, opt-in companion binary that lets a remote\n management center observe and, opt-in, dispatch tasks to a local scoot\n agent. Installing it pulls in scoot, since scoot-edge launches the agent\n as a subprocess. Statically linked (musl); no runtime dependencies.'

          for pair in linux-amd64:amd64 linux-arm64:arm64 linux-armv7:armhf; do
            asset="${pair%%:*}"
            deb_arch="${pair##*:}"
            build_one scoot "$asset" "$deb_arch" "" "$scoot_desc" README.md config.example.toml
            build_one scoot-wasm "$asset" "$deb_arch" scoot "$wasm_desc" README.md
            build_one scoot-edge "$asset" "$deb_arch" scoot "$edge_desc" README.md EDGE.md EDGE.zh.md
          done

          cd "$WORKDIR/tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pool/main/s/scoot pool/main/s/scoot-wasm pool/main/s/scoot-edge
          if git diff --cached --quiet; then
            echo "scoot ${VERSION} .deb packages already up to date"
            exit 0
          fi
          git commit -m "scoot ${VERSION} (scoot, scoot-wasm, scoot-edge; amd64, arm64, armhf)"

          # apt-tap is a shared repo that other projects may push to as well,
          # so retry on a rejected push instead of failing outright.
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "pushed on attempt ${attempt}"
              exit 0
            fi
            [ "$attempt" -eq 5 ] && { echo "push failed after 5 attempts" >&2; exit 1; }
            echo "push rejected (attempt ${attempt}), fetching + rebasing..." >&2
            sleep $(( attempt * 5 ))
            git fetch origin main
            git rebase origin/main
          done

  docker:
    name: Build and publish Docker image (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    env:
      DOCKERHUB_USERNAME: ${{ secrets.SCOOT_DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.SCOOT_DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: default
            target: runtime
            tag_suffix: ""
          - flavor: alpine
            target: runtime-alpine
            tag_suffix: "-alpine"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        # Ensure it doesn't fail if the user hasn't set up the secret yet,
        # but attempts if the secret exists.
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Strip v prefix from version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve Docker image names
        id: images
        run: |
          {
            echo "images<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY,,}"
            if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
              echo "${DOCKERHUB_USERNAME}/scoot"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.images }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=true
          flavor: |
            suffix=${{ matrix.tag_suffix }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
