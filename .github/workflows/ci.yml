name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ZIG_VERSION: 0.16.0
  ZIG_SHA256: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00

jobs:
  zig:
    name: Zig format, build, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Zig
        run: |
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          echo "${ZIG_SHA256}  zig.tar.xz" | sha256sum -c -
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
          "$PWD/zig-x86_64-linux-${ZIG_VERSION}/zig" version

      - name: Secret hygiene guard
        run: |
          set -euo pipefail
          # config.toml must stay ignored so a local secret-bearing config can
          # never be committed.
          if ! git check-ignore -q config.toml; then
            echo "::error::config.toml is not gitignored; secrets could be committed"
            exit 1
          fi
          # No inline API-key literals may enter source or the example config.
          if grep -rnIE 'sk-[A-Za-z0-9]{12,}|api[_-]?key[[:space:]]*=[[:space:]]*"[^"]+"' \
               src config.example.toml; then
            echo "::error::inline secret literal found; use api_key_env/file/cmd instead"
            exit 1
          fi

      - name: Format check
        run: zig fmt --check build.zig src examples

      - name: Build Debug
        run: zig build

      - name: Test
        run: zig build test

      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe

      - name: CLI smoke
        run: zig build run -- --version

  release-smoke:
    name: Release target smoke (${{ matrix.asset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: linux-amd64
            target: x86_64-linux-musl
          - asset: linux-arm64
            target: aarch64-linux-musl
          - asset: macos-arm64
            target: aarch64-macos
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Zig
        run: |
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          echo "${ZIG_SHA256}  zig.tar.xz" | sha256sum -c -
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
          "$PWD/zig-x86_64-linux-${ZIG_VERSION}/zig" version

      - name: Cross-compile ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

  docs:
    name: mdBook build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install mdBook
        run: cargo install mdbook --locked

      - name: Build English book
        run: mdbook build book/en

      - name: Build Chinese book
        run: mdbook build book/zh
