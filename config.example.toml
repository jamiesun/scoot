# Scoot sample configuration.
#
# Copy this file to ~/.scoot/config.toml, or put it under the directory
# pointed to by SCOOT_HOME as config.toml.
#
# Loading order: config.toml first, then config.json. Missing sections or
# fields fall back to built-in defaults. Unknown fields are ignored.
# Keep secrets out of this file; use api_key_env, api_key_file, or api_key_cmd.

[backend]
# OpenAI-compatible endpoint base URL. Scoot speaks ONLY the OpenAI Responses
# API (/v1/responses); the backend must serve it. Local servers that support it
# include Ollama >= 0.13.3 and vLLM (both stateless). A Chat-Completions-only
# server must sit behind a Responses-compatible gateway.
# Default local Ollama-compatible endpoint:
base_url = "http://127.0.0.1:11434/v1"

# Model name sent to the backend.
model = "qwen2.5"

# Hard timeout for each backend Responses API call, in milliseconds.
# Set to 0 only if you intentionally want no backend deadline.
timeout_ms = 120000

# Ask the backend to persist the response server-side via the Responses API
# `store` flag. Off by default to keep Scoot stateless and local-first: the
# full input is resent each turn so local context compaction stays in control.
# store = false

# Environment variable used as the first API token source.
# The value of this environment variable is never written back to disk.
api_key_env = "OPENAI_API_KEY"

# Optional token file path.
# Omit this field to use ~/.scoot/token. If set, the file must be 0600.
# api_key_file = "/Users/you/.config/scoot/token"

# Optional command that prints a token, used after env and file sources.
# Keep the command bounded and non-interactive.
# api_key_cmd = "pass show openai"

# Optional PEM CA bundle path for HTTPS backends and http_request.
# Omit this field to scan system root certificates.
# ca_file = "/etc/ssl/certs/ca-certificates.crt"

# Prompt caching needs no configuration: leading system messages are sent as the
# Responses API top-level `instructions`, which providers cache automatically.

# Optional extra request body fields merged into the model request JSON.
# Omit the whole [backend.extra_body] table when no extra fields are needed.
# Do not put secrets here. Do not override core fields like model/input.
#
# [backend.extra_body]
# service_tier = "priority"
# reasoning_effort = "high"
# top_p = 0.9

[agent]
# Maximum ReACT turns before the agent stops to avoid runaway loops.
max_turns = 32

# Default cognition mode. Supported today: "goal"; "plan" is reserved.
default_mode = "goal"

# Context compaction strategy:
# - extractive: default; keep a deterministic navigation summary of files,
#   commands, policy denials, and notable observations.
# - drop: replace older history with a compact count marker.
# - plugin:<name>: run an external compressor package declared below, then
#   fall back to extractive/drop on timeout, bad output, policy denial, or
#   over-budget output.
compactor = "extractive"

# Context budget in bytes for the cumulative prompt history across turns.
# When the running transcript would exceed this, the agent first *compacts*
# history using the configured compactor, so a long run can continue instead of
# aborting. It only fails fast (with a clear error) if the history is still over
# budget after compaction (i.e. the budget is too small for even the minimal
# retained context). Bytes are a coarse proxy for tokens; pick a conservative
# value below your backend's context window.
# Set to 0 to disable the check (turn-count remains bounded by max_turns).
context_budget_bytes = 80000

# Optional external compressor plugin. The package uses the same static
# descriptor boundary as wasm tool packages, but manifest.toml must set
# kind = "compressor". The host is an argv template; supported placeholders:
# {package}, {component}, {entry}. If omitted, Scoot tries {package}/{entry}.
#
# compactor = "plugin:tiny"
# [agent.compactor_plugin.tiny]
# package = "/opt/scoot/compressors/tiny"
# host = ["/usr/bin/env", "tiny-compressor-host", "{package}", "{component}"]
# timeout_ms = 30000
# stdout_limit = 1048576
# stderr_limit = 262144

[tools]
# Hard timeout for each tool call, in milliseconds.
timeout_ms = 30000

# Execution policy for interactive tool use:
# - guarded: default; blocks catastrophic shell commands, allows ordinary work.
# - readonly: fail-closed read-only mode; blocks writes and network mutations.
# - unrestricted: no policy limit, still audited.
# Alias: "yolo" is parsed as unrestricted. Unknown values fall back to guarded.
policy = "guarded"

# Hardening (effective only in guarded mode; issues #32 / #50 / #113).
# readonly already fail-closes writes and network, so these matter for guarded only.
# confine_writes: keep file_write/file_edit inside the project root; reject absolute
#   paths, ".." escapes, and shell-style expansion (~ / $VAR). Defaults to true;
#   set false only if you intentionally allow out-of-cwd writes.
confine_writes = true
# block_internal_http: reject http_request to loopback / private / link-local / cloud
#   metadata hosts (SSRF guard). Defaults to true (issue #50): legitimate agent HTTP
#   almost never targets these, so the friction is low and the SSRF win is high. Set
#   false only if you must reach internal hosts. Heuristic on literal IPs + known
#   internal names; it does NOT resolve DNS, so DNS-rebinding can still bypass — use
#   readonly for real isolation.
block_internal_http = true

[skills]
# Enable local Skill discovery.
enabled = true

# Include the project-local directory <cwd>/.agents/skills.
# Default is false because repository-carried skills are untrusted until you opt in.
include_project_skills = false

# Include the cross-agent user-level directory ~/.agents/skills.
# Default is false to avoid global skills polluting this agent's skill space.
include_agents_skills = false

# Extra Skill search paths, appended after the built-in ones. Skills are
# discovered in priority order (earlier wins on name collision):
#   1. <cwd>/.agents/skills  (only when include_project_skills=true)
#   2. ~/.agents/skills      (only when include_agents_skills=true)
#   3. ~/.scoot/skills       (Scoot's own user-level dir)
#   4. these extra_paths
# Reading a skill's SKILL.md is a native, read-only capability and works even in
# readonly mode; what a skill then tells the model to run is still policy-gated.
extra_paths = []
# extra_paths = ["/opt/scoot/skills", "./skills"]

[mcp]
# External MCP servers callable through the mcp_call action.
# Calls fail closed: server names must match this list, and the requested tool
# must be explicitly listed in allowed_tools. "stdio" works today; "http" and
# "sse" are accepted in config as reserved transports for future support.

# [[mcp.servers]]
# name = "demo"
# transport = "stdio"
# command = "/path/to/mcp-server"
# args = ["--flag", "value"]
# env = [{ name = "SERVER_MODE", value = "readonly" }]
# allowed_tools = ["lookup", "read_resource"]
# policy = "readonly"

# Reserved for future Streamable HTTP / legacy SSE transports:
# [[mcp.servers]]
# name = "remote-demo"
# transport = "http"
# url = "https://example.com/mcp"
# allowed_tools = ["lookup"]

[audit]
# Audit verbosity: debug, info, warn, or error.
level = "info"

# Write audit logs under ~/.scoot/logs.
to_file = true

[schedule]
# Enable unattended scheduled agent runs. Keep false unless explicitly needed.
enabled = false

# Scheduler polling interval in milliseconds.
poll_ms = 1000

# Scheduled jobs are optional. Each job needs exactly one trigger:
# every_sec, at_unix, or cron. Cron uses a 5-field UTC expression and fires at
# most once per matching minute. Schedule jobs default to readonly mode; guarded
# is corrected to readonly at execution time. Use unrestricted only with
# deliberate acceptance of unattended write/network risk.

# [[schedule.jobs]]
# id = "disk-check"
# goal = "Inspect disk usage and summarize anomalies"
# every_sec = 300
# mode = "readonly"

# [[schedule.jobs]]
# id = "morning"
# goal = "Prepare today's task brief"
# at_unix = 1893456000
# mode = "readonly"

# [[schedule.jobs]]
# id = "weekday-brief"
# goal = "Prepare a weekday morning brief"
# cron = "0 9 * * *"
# mode = "readonly"
